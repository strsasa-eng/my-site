<svg width="300" height="160" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cień -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"></feDropShadow>
    </filter>

    <!-- Gradient tła -->
    <linearGradient id="darkGreenGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b5e3b"></stop>
      <stop offset="100%" stop-color="#0f3d28"></stop>
    </linearGradient>

    <!-- Jasny tekst z głębią -->
    <filter id="lightTextDepth">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.6"></feDropShadow>
    </filter>
  </defs>

  <!-- Tło -->
  <rect x="10" y="10" width="280" height="140" rx="22" fill="url(#darkGreenGradient)" filter="url(#softShadow)"></rect>

  <!-- Tekst -->
  <text x="150" y="100" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" fill="#eafff3" filter="url(#lightTextDepth)">
    DMO
  </text>
</svg>
